<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I-Ready Services - Maintenance</title>
<link rel="icon" id="dynamic-favicon" type="image/png" href="/../img/favicons/favicon-64x64.png" sizes="64x64">
<style>
:root {
    --bg: #0b0f1a;
    --text: #e6edf3;
    --text2: #9aa4b2;
    --accent: #3ba4f7;
    --border: #1f2937;
    --radius: 12px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* NAV */
.nav {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
}

.nav h1 {
    font-size: 1rem;
    font-weight: 700;
}

.nav span {
    color: var(--accent);
}

/* CENTER HERO */
.hero {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.hero-content {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center; /* ensures children are horizontally centered */
    gap: 24px; /* spacing between elements */
    max-width: 600px; /* slightly wider for readability */
}

.hero-content h1 {
    font-size: clamp(2rem, 4vw, 3.2rem);
}

.hero-content h1 span {
    color: var(--accent);
}

.hero-content p {
    color: var(--text2);
    line-height: 1.6;
    font-size: 1.1rem;
}

/* BUTTON */
.btn {
    padding: 12px 22px;
    border-radius: var(--radius);
    font-weight: 700;
    cursor: pointer;
    border: none;
    background: var(--accent);
    color: #fff;
    transition: opacity 0.2s;
}

.btn:hover {
    opacity: 0.85;
}
</style>
</head>

<body>

<div class="nav">
    <h1>I-Ready <span>Services</span></h1>
</div>

<section class="hero">
    <div class="hero-content">
        <h1>We’re <span>temporarily down.</span></h1>

        <p>
            Our site is currently undergoing maintenance to improve performance and add new features.
            Please check back soon.
        </p>

        <button class="btn" onclick="location.reload()">Refresh</button>
    </div>
</section>

</body>
</html>
